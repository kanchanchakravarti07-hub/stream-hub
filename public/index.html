<!DOCTYPE html>
<html>
<head>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
</head>
<body>
    <select id="sel" onchange="load()"></select>
    
    <video id="vid" class="video-js vjs-big-play-centered" controls autoplay playsinline width="640" height="360"></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('vid');

        async function init() {
            try {
                const res = await fetch('/channels');
                const ch = await res.json();
                const sel = document.getElementById('sel');
                
                Object.keys(ch).forEach(name => {
                    let opt = document.createElement('option');
                    opt.value = ch[name];
                    opt.innerHTML = name;
                    sel.appendChild(opt);
                });
                load(); // Pehla channel load karo
            } catch(e) {
                console.error("Channels load nahi hue:", e);
            }
        }

        function load() {
            const url = document.getElementById('sel').value;
            const proxyUrl = "https://iptv-eldbert.xyz/proxy?url=" + encodeURIComponent(url);
            player.src({ src: proxyUrl, type: 'application/x-mpegURL' });
            player.play();
        }

        // Page load hote hi init chalao
        init();
    </script>
</body>
</html>
