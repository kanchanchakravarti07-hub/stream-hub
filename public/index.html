<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Master | FIFA 2026</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; }
        h1 { font-size: 2rem; margin-bottom: 30px; border-left: 5px solid #e50914; padding-left: 15px; }
        
        #vid { width: 100%; max-width: 900px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: 0 auto 40px auto; display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { 
            background: #181818; padding: 25px; border-radius: 12px; 
            transition: transform 0.3s, background 0.3s; cursor: pointer;
            border: 1px solid #333; text-align: center;
        }
        .card:hover { transform: scale(1.05); background: #222; border-color: #e50914; }
        .card h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .live-badge { color: #e50914; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>FIFA World Cup 2026 - Live</h1>
    <video id="vid" class="video-js vjs-big-play-centered" controls autoplay playsinline></video>
    <div class="grid" id="channelGrid"></div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('vid');
        console.log("Script load ho gayi!"); // Yeh line check karne ke liye hai
        async function init() {
            console.log("Init start...");
            try {
                const res = await fetch('/channels');
                if (!res.ok) throw new Error("HTTP error " + res.status);
                const ch = await res.json();
                console.log("Channels:", ch);
                
                const grid = document.getElementById('channelGrid');
                const keys = Object.keys(ch);
                
                if (keys.length === 0) {
                    grid.innerHTML = "<p style='color:red;'>Channels file khali hai bhai, scraper check kar!</p>";
                    return;
                }

                keys.forEach(name => {
                    let div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<h3>${name}</h3><span class="live-badge">● LIVE</span>`;
                    div.onclick = () => play(ch[name]);
                    grid.appendChild(div);
                });
            } catch(e) {
                console.error("Critical Error:", e);
                document.body.innerHTML += `<p style='color:red;'>Error: ${e.message}</p>`;
            }
        }
        async function init() {
            try {
                const res = await fetch('/channels');
                const ch = await res.json();
                const grid = document.getElementById('channelGrid');
                
                Object.keys(ch).forEach(name => {
                    let div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<h3>${name}</h3><span class="live-badge">● LIVE</span>`;
                    div.onclick = () => play(ch[name]);
                    grid.appendChild(div);
                });
            } catch(e) {
                console.error("Channels load nahi hue:", e);
            }
        }

        function play(url) {
            // Proxy URL jo stream ko bypass karega
            const proxyUrl = "https://iptv-eldbert.xyz/proxy?url=" + encodeURIComponent(url);
            
            player.reset();
            player.src({ src: proxyUrl, type: 'application/x-mpegURL' });
            player.play().catch(err => console.log("Play failed, click to start:", err));
        }

        init();
    </script>
</body>
</html>
